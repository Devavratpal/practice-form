<!DOCTYPE html>
<html>
<head>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* FULL SCREEN BACKGROUND */
.bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background-image-"url(https://i.ibb.co/cXyctxfT/DATA-WAVES.jpg)";
  background-size:cover;
  background-position:center;
  z-index:-1;  /* stays in background */
}

/* BODY */
body{
  color:white;
  font-weight:bold;
  font-family: monospace;
}

/* TITLE */
.title{
  text-align:center;
  font-size:40px;
  margin:20px 0;
}

/* GLASS FORM DESIGN */
.form-box{
  margin:20px;
  padding:20px;
  width:320px;

  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(12px);
  border-radius:15px;
  box-shadow:0 0 20px rgba(0,255,255,0.3);
}

/* TABLE */
table{
  border-spacing:10px;
}

/* INPUT FIELDS */
input, select, textarea{
  width:180px;
  padding:7px;
  border:none;
  border-radius:6px;
  outline:none;
  transition:0.3s;
}

/* FOCUS GLOW EFFECT */
input:focus, select:focus, textarea:focus{
  box-shadow:0 0 10px #00f2ff;
}

/* TEXTAREA */
textarea{
  height:60px;
}

/* CENTER BUTTON */
.btn-row{
  text-align:center;
}

/* SUBMIT BUTTON */
.submitbtn{
  width:180px;
  padding:10px;
  font-size:18px;
  border:none;
  border-radius:8px;
  cursor:pointer;

  background: linear-gradient(45deg, #00f2ff, #007bff);
  color:white;
  transition:0.3s;
}

.submitbtn:hover{
  transform: scale(1.08);
  box-shadow:0 0 20px #00f2ff;
}

.submitbtn:active{
  transform: scale(0.95);
}

</style>

<script>
function updateDistrict(){

var state=document.getElementById("state").value;
var district=document.getElementById("district");

district.innerHTML="<option>Select</option>";

if(state=="Bihar"){
district.innerHTML+="<option>Kaimur</option>";
district.innerHTML+="<option>Bhabua</option>";
district.innerHTML+="<option>Patna</option>";
}

else if(state=="Uttar Pradesh"){
district.innerHTML+="<option>Varanasi</option>";
district.innerHTML+="<option>Lucknow</option>";
district.innerHTML+="<option>Prayagraj</option>";
}

else if(state=="Jharkhand"){
district.innerHTML+="<option>Ranchi</option>";
district.innerHTML+="<option>Dhanbad</option>";
}

else if(state=="West Bengal"){
district.innerHTML+="<option>Kolkata</option>";
district.innerHTML+="<option>Darjeeling</option>";
}

}
</script>

</head>

<body>

<!-- BACKGROUND DIV -->
<div class="bg"></div>

<h1 class="title">Fill the Form</h1>

<div class="form-box">

<form action="https://formspree.io/f/xyknnren" method="post">

<table>

<tr><td>First Name:</td><td><input type="text" name="nickname"></td></tr>
<tr><td>Last Name:</td><td><input type="text" name="surname"></td></tr>
<tr><td>Father's Name:</td><td><input type="text" name="fathername"></td></tr>
<tr><td>Class:</td><td><input type="text" name="class"></td></tr>

<tr>
<td>Gender:</td>
<td>
<select name="sex">
<option>Select</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>
</td>
</tr>

<tr><td>Date of Birth:</td><td><input type="date" name="dob"></td></tr>
<tr><td>Email:</td><td><input type="email" name="email"></td></tr>
<tr><td>Phone:</td><td><input type="tel" name="phone"></td></tr>

<tr>
<td>State:</td>
<td>
<select name="state" id="state" onchange="updateDistrict()">
<option>Select</option>
<option>Bihar</option>
<option>Uttar Pradesh</option>
<option>Jharkhand</option>
<option>West Bengal</option>
</select>
</td>
</tr>

<tr>
<td>District:</td>
<td>
<select id="district">
<option>Select</option>
</select>
</td>
</tr>

<tr><td>Pin Code:</td><td><input type="number" name="pincode"></td></tr>
<tr><td>Address:</td><td><textarea name="address"></textarea></td></tr>

<tr class="btn-row">
<td colspan="2">
<input class="submitbtn" type="submit" value="Submit">
</td>
</tr>

</table>

</form>

</div>

</body>
                             </html>
